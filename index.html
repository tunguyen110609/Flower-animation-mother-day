<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Mother's Day Garden</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Cormorant+Garamond:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="title-wrap">
  <h1>Happy Mother's Day</h1>
  <p>A garden grown with love 🌸</p>
</div>

<!-- CLOUDS -->
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<!-- FLOATING PETALS -->
<div class="petal" style="left:10%; animation-duration:12s; animation-delay:-2s;"></div>
<div class="petal" style="left:25%; animation-duration:16s; animation-delay:-5s;"></div>
<div class="petal" style="left:40%; animation-duration:14s; animation-delay:-8s;"></div>
<div class="petal" style="left:60%; animation-duration:18s; animation-delay:-3s;"></div>
<div class="petal" style="left:80%; animation-duration:15s; animation-delay:-7s;"></div>

<!-- SPARKLES -->
<div class="sparkle" style="left:15%; top:20%; animation-duration:8s; animation-delay:0s;"></div>
<div class="sparkle" style="left:35%; top:25%; animation-duration:10s; animation-delay:-2s;"></div>
<div class="sparkle" style="left:55%; top:30%; animation-duration:9s; animation-delay:-4s;"></div>
<div class="sparkle" style="left:75%; top:20%; animation-duration:11s; animation-delay:-1s;"></div>
<div class="sparkle" style="left:85%; top:35%; animation-duration:7s; animation-delay:-3s;"></div>

<!-- MEMORY BOOK -->
<div class="memory-book" onclick="openGallery()">
  <div class="book-cover">
    <div class="book-spine"></div>
    <div class="book-title">Our Memories</div>
    <div class="book-heart">💕</div>
  </div>
  <div class="book-shadow"></div>
</div>

<!-- GALLERY MODAL -->
<div id="gallery-modal" class="gallery-modal">
  <div class="gallery-content">
    <span class="close-gallery" onclick="closeGallery()">&times;</span>
    <div class="gallery-grid">
      <div class="gallery-item">
        <img src="Image/20230310_065318.jpg?w=300&h=300&fit=crop" alt="Beautiful flowers">
        <div class="gallery-caption">Mom</div>
      </div>
      <div class="gallery-item">
        <img src="Image/20231022_120743.jpg?w=300&h=300&fit=crop" alt="Rose garden">
        <div class="gallery-caption">Mom</div>
      </div>
      <div class="gallery-item">
        <img src="Image/20240902_103624.jpg?w=300&h=300&fit=crop" alt="Tulip field">
        <div class="gallery-caption">Mom</div>
      </div>
      <div class="gallery-item">
        <img src="Image/20250831_144827.jpg?w=300&h=300&fit=crop" alt="Sunflower field">
        <div class="gallery-caption">Mom</div>
      </div>
      <div class="gallery-item">
        <img src="Image/394955916_1963678417349361_986713739647959131_n.jpg?w=300&h=300&fit=crop" alt="Lily pond">
        <div class="gallery-caption">Mom</div>
      </div>
      <div class="gallery-item">
        <img src="Image/474970674_1020593809878380_7697348059386966917_n.jpg?w=300&h=300&fit=crop" alt="Mother's love">
        <div class="gallery-caption">Mom</div>
      </div>
    </div>
  </div>
</div>

<div class="garden">

    <!-- 🌷 TULIP -->
  <div class="plant tulip">
    <div class="bloom">
      <svg width="62" height="78" viewBox="0 0 62 78" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Left outer petal -->
        <path d="M31 78 C11 73 3 43 13 18 C21 28 23 53 31 78Z" fill="#e53935"/>
        <!-- Right outer petal -->
        <path d="M31 78 C51 73 59 43 49 18 C41 28 39 53 31 78Z" fill="#c62828"/>
        <!-- Back/center petal -->
        <path d="M31 78 C21 68 19 38 31 13 C43 38 41 68 31 78Z" fill="#ef9a9a"/>
        <!-- Inner left -->
        <path d="M31 78 C18 70 17 42 31 20 C40 35 38 62 31 78Z" fill="#ef5350"/>
        <!-- Inner right -->
        <path d="M31 78 C44 70 45 42 31 20 C22 35 24 62 31 78Z" fill="#e53935" opacity=".85"/>
        <!-- Highlight -->
        <path d="M24 68 C20 55 21 35 26 22 C26 38 25 55 24 68Z" fill="#ff8a80" opacity=".45"/>
        <!-- Pistil -->
        <line x1="31" y1="70" x2="31" y2="22" stroke="#4caf50" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
      </svg>
    </div>
    <div class="stem-wrap">
      <div class="leaf"></div>
      <div class="leaf r"></div>
      <div class="stem"></div>
    </div>
    
  </div>

  <!-- ROSE -->
   <div class="plant rose">
    <div class="bloom">
      <svg width="78" height="78" viewBox="0 0 78 78" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(39,42)">
          <!-- Outer petals -->
          <ellipse cx="0" cy="-20" rx="11" ry="16" fill="#e8637a" opacity=".9" transform="rotate(0)"/>
          <ellipse cx="0" cy="-20" rx="11" ry="16" fill="#d4405a" opacity=".9" transform="rotate(51.4)"/>
          <ellipse cx="0" cy="-20" rx="11" ry="16" fill="#e8637a" opacity=".9" transform="rotate(102.8)"/>
          <ellipse cx="0" cy="-20" rx="11" ry="16" fill="#d4405a" opacity=".9" transform="rotate(154.2)"/>
          <ellipse cx="0" cy="-20" rx="11" ry="16" fill="#e8637a" opacity=".9" transform="rotate(205.6)"/>
          <ellipse cx="0" cy="-20" rx="11" ry="16" fill="#d4405a" opacity=".9" transform="rotate(257.0)"/>
          <ellipse cx="0" cy="-20" rx="11" ry="16" fill="#e8637a" opacity=".9" transform="rotate(308.4)"/>
          <!-- Mid petals -->
          <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#c2185b" transform="rotate(25)"/>
          <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#e91e8c" transform="rotate(97)"/>
          <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#c2185b" transform="rotate(169)"/>
          <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#e91e8c" transform="rotate(241)"/>
          <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#c2185b" transform="rotate(313)"/>
          <!-- Inner petals -->
          <ellipse cx="0" cy="-8"  rx="5" ry="9" fill="#f48fb1" transform="rotate(15)"/>
          <ellipse cx="0" cy="-8"  rx="5" ry="9" fill="#ec407a" transform="rotate(135)"/>
          <ellipse cx="0" cy="-8"  rx="5" ry="9" fill="#f48fb1" transform="rotate(255)"/>
          <!-- Core -->
          <circle r="6"  fill="#c2185b"/>
          <circle r="3.5" fill="#880e4f"/>
          <!-- Dewdrop -->
          <circle cx="3" cy="-3" r="1.5" fill="white" opacity=".6"/>
        </g>
      </svg>
    </div>
    <div class="stem-wrap">
      <div class="leaf"></div>
      <div class="leaf r"></div>
      <div class="stem"></div>
    </div>

  </div>
  <!-- SUNFLOWER -->
  <div class="plant sunflower">
    <div class="bloom">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="petalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#fff9c4"/>
            <stop offset="50%" stop-color="#ffeb3b"/>
            <stop offset="100%" stop-color="#fbc02d"/>
          </linearGradient>
          <radialGradient id="sunflowerCenter" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#8d6e63"/>
            <stop offset="50%" stop-color="#5d4037"/>
            <stop offset="100%" stop-color="#3e2723"/>
          </radialGradient>
        </defs>

        <g transform="translate(60,60)">
          <!-- Petals -->
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(0)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(30)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(60)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(90)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(120)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(150)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(180)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(210)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(240)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(270)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(300)"/>
          <ellipse cx="0" cy="-45" rx="8" ry="25" fill="url(#petalGradient)" transform="rotate(330)"/>

          <!-- Inner ring of smaller petals -->
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(15)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(45)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(75)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(105)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(135)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(165)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(195)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(225)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(255)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(285)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(315)"/>
          <ellipse cx="0" cy="-35" rx="6" ry="18" fill="#ffeb3b" transform="rotate(345)"/>

          <!-- Center -->
          <circle r="22" fill="url(#sunflowerCenter)"/>
          <circle r="18" fill="#8d6e63" opacity="0.8"/>
          <circle r="12" fill="#a1887f"/>
        </g>
      </svg>
    </div>
    <div class="stem"></div>
  </div>

  <!-- LILY -->
  <div class="plant lily">
    <div class="bloom">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <defs>
          <linearGradient id="gLily" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff3e0"/>
            <stop offset="30%" stop-color="#fce4ec"/>
            <stop offset="70%" stop-color="#f8bbd9"/>
            <stop offset="100%" stop-color="#ec407a"/>
          </linearGradient>
          <radialGradient id="lilyCenter" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#fff9c4"/>
            <stop offset="50%" stop-color="#ffeb3b"/>
            <stop offset="100%" stop-color="#f57c00"/>
          </radialGradient>
        </defs>

        <g transform="translate(55,60)">
          <!-- Outer petals -->
          <path d="M0 -5 C-20 -25 -25 -50 0 -65 C25 -50 20 -25 0 -5Z" fill="url(#gLily)"/>
          <path d="M0 -5 C-20 -25 -25 -50 0 -65 C25 -50 20 -25 0 -5Z" fill="url(#gLily)" transform="rotate(60)"/>
          <path d="M0 -5 C-20 -25 -25 -50 0 -65 C25 -50 20 -25 0 -5Z" fill="url(#gLily)" transform="rotate(120)"/>
          <path d="M0 -5 C-20 -25 -25 -50 0 -65 C25 -50 20 -25 0 -5Z" fill="url(#gLily)" transform="rotate(180)"/>
          <path d="M0 -5 C-20 -25 -25 -50 0 -65 C25 -50 20 -25 0 -5Z" fill="url(#gLily)" transform="rotate(240)"/>
          <path d="M0 -5 C-20 -25 -25 -50 0 -65 C25 -50 20 -25 0 -5Z" fill="url(#gLily)" transform="rotate(300)"/>

          <!-- Inner petals -->
          <path d="M0 -2 C-12 -15 -15 -35 0 -45 C15 -35 12 -15 0 -2Z" fill="#f06292"/>
          <path d="M0 -2 C-12 -15 -15 -35 0 -45 C15 -35 12 -15 0 -2Z" fill="#f06292" transform="rotate(60)"/>
          <path d="M0 -2 C-12 -15 -15 -35 0 -45 C15 -35 12 -15 0 -2Z" fill="#f06292" transform="rotate(120)"/>
          <path d="M0 -2 C-12 -15 -15 -35 0 -45 C15 -35 12 -15 0 -2Z" fill="#f06292" transform="rotate(180)"/>
          <path d="M0 -2 C-12 -15 -15 -35 0 -45 C15 -35 12 -15 0 -2Z" fill="#f06292" transform="rotate(240)"/>
          <path d="M0 -2 C-12 -15 -15 -35 0 -45 C15 -35 12 -15 0 -2Z" fill="#f06292" transform="rotate(300)"/>

          <!-- Center -->
          <ellipse cx="0" cy="-20" rx="8" ry="12" fill="url(#lilyCenter)"/>
          <ellipse cx="0" cy="-20" rx="4" ry="6" fill="#ff9800"/>
        </g>
      </svg>
    </div>
    <div class="stem"></div>
  </div>

  <!-- ORCHID -->
  <div class="plant orchid">
    <div class="bloom">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <defs>
          <linearGradient id="orchidPetal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f3e5f5"/>
            <stop offset="50%" stop-color="#ce93d8"/>
            <stop offset="100%" stop-color="#9c27b0"/>
          </linearGradient>
          <radialGradient id="orchidLip" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#ff80ab"/>
            <stop offset="50%" stop-color="#e91e63"/>
            <stop offset="100%" stop-color="#880e4f"/>
          </radialGradient>
        </defs>

        <g transform="translate(55,65)">
          <!-- Sepals (outer petals) -->
          <ellipse cx="0" cy="-30" rx="25" ry="12" fill="#e1bee7" transform="rotate(-15)"/>
          <ellipse cx="0" cy="-30" rx="25" ry="12" fill="#e1bee7" transform="rotate(15)"/>
          <ellipse cx="-20" cy="-10" rx="12" ry="20" fill="#ce93d8" transform="rotate(-45)"/>
          <ellipse cx="20" cy="-10" rx="12" ry="20" fill="#ce93d8" transform="rotate(45)"/>

          <!-- Petals -->
          <ellipse cx="0" cy="-25" rx="20" ry="10" fill="url(#orchidPetal)" transform="rotate(-10)"/>
          <ellipse cx="0" cy="-25" rx="20" ry="10" fill="url(#orchidPetal)" transform="rotate(10)"/>
          <ellipse cx="-15" cy="-5" rx="10" ry="15" fill="#ba68c8" transform="rotate(-30)"/>
          <ellipse cx="15" cy="-5" rx="10" ry="15" fill="#ba68c8" transform="rotate(30)"/>

          <!-- Lip (labellum) -->
          <path d="M-12 5 Q0 20 12 5 Q8 15 0 18 Q-8 15 -12 5Z" fill="url(#orchidLip)"/>
          <path d="M-8 8 Q0 15 8 8 Q6 12 0 14 Q-6 12 -8 8Z" fill="#d81b60"/>

          <!-- Column (central reproductive structure) -->
          <rect x="-2" y="-15" width="4" height="12" fill="#4a148c"/>
          <ellipse cx="0" cy="-3" rx="3" ry="2" fill="#6a1b9a"/>

          <!-- Pollinia -->
          <circle cx="-1" cy="-8" r="1.5" fill="#ffd54f"/>
          <circle cx="1" cy="-8" r="1.5" fill="#ffd54f"/>
        </g>
      </svg>
    </div>

    <div class="stem"></div>
  </div>

</div>

<div class="ground"></div>

<script>
function openGallery() {
  document.getElementById('gallery-modal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeGallery() {
  document.getElementById('gallery-modal').style.display = 'none';
  document.body.style.overflow = 'auto';
}

// Close gallery when clicking outside the content
document.getElementById('gallery-modal').addEventListener('click', function(event) {
  if (event.target === this) {
    closeGallery();
  }
});

// Close gallery with Escape key
document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') {
    closeGallery();
  }
});
</script>

</body>
</html>
